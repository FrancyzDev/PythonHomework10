<div class="branch-card" style="background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s ease; display: flex; flex-direction: column; gap: 1rem;">

    <div style="width: 100%; height: 200px; background: #f8f9fa; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
        {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.name }}"
             style="width: 100%; height: 100%; object-fit: cover; display: block;">
        {% else %}
        <div style="text-align: center; color: #999; padding: 1rem;">
            Немає фото
        </div>
        {% endif %}
    </div>

    <div style="flex: 1;">
        <h2 style="color: #2c3e50; margin: 0 0 0.5rem 0; font-size: 1.2rem; line-height: 1.3; min-height: 3rem;">{{ product.name }}</h2>

        <div style="display: flex; justify-content: space-between; align-items: baseline; margin: 0.5rem 0; flex-wrap: wrap; gap: 0.5rem;">
            <div>
                <strong style="color: #e74c3c;">Ціна:</strong>
                <span style="font-weight: bold; font-size: 1.2rem; color: #2c3e50;">{{ product.price }} грн</span>
            </div>
            <div>
                <strong style="color: #555;">Калорійність:</strong>
                <span style="color: #666;">{{ product.calories }} ккал</span>
            </div>
        </div>
    </div>
</div>
